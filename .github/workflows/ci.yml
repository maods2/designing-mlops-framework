name: CI

on:
  push:
    branches: [main, develop, master]
  pull_request:
    branches: [main, develop, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install ruff
        run: pip install ruff>=0.1.0
      - name: Lint with ruff
        run: ruff check mlplatform/mlplatform/ example_model/ --ignore E501

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install mlplatform with dev extras
        run: pip install -e "mlplatform[dev]"

      - name: Install example_model dependencies
        run: pip install -r example_model/requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

      - name: Run e2e tests
        run: pytest tests/e2e/ -v --tb=short

      - name: Run all tests with coverage
        run: |
          pip install pytest-cov
          pytest tests/ --cov=mlplatform/mlplatform --cov-report=term-missing -v
