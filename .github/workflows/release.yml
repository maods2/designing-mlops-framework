name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# The workflow:
#   1. Verifies the tag matches the version declared in mlplatform/_version.py
#   2. Runs the full test suite (fail-fast: any test failure blocks release)
#   3. Builds the distribution (sdist + wheel)
#   4. Publishes to JFrog Artifactory
#   5. Creates a GitHub Release with auto-generated release notes

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # matches v0.1.0, v1.2.3, etc.

jobs:
  # ---------------------------------------------------------------------------
  # Gate: version tag must match _version.py
  # ---------------------------------------------------------------------------
  verify-version:
    name: Verify version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check tag matches _version.py
        run: |
          PKG_VERSION=$(python -c "from mlplatform._version import __version__; print(__version__)" \
            --pythonpath mlplatform)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Package version : $PKG_VERSION"
          echo "Tag version     : $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match _version.py ($PKG_VERSION)."
            echo "::error::Update mlplatform/_version.py before tagging."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Gate: all tests must pass
  # ---------------------------------------------------------------------------
  test:
    name: Run tests (Python ${{ matrix.python-version }})
    needs: verify-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with all dev/test dependencies
        run: pip install -e "mlplatform[dev,utils,config]"

      - name: Run unit tests
        run: pytest mlplatform/tests/unit/ -v

      - name: Run integration tests
        run: pytest mlplatform/tests/integration/ -v

  # ---------------------------------------------------------------------------
  # Build and publish
  # ---------------------------------------------------------------------------
  publish:
    name: Build and publish to JFrog Artifactory
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create a GitHub Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build mlplatform/

      - name: Publish to JFrog Artifactory
        env:
          JFROG_URL: ${{ secrets.JFROG_URL }}
          JFROG_USER: ${{ secrets.JFROG_USER }}
          JFROG_PASSWORD: ${{ secrets.JFROG_PASSWORD }}
        run: |
          twine upload \
            --repository-url "$JFROG_URL" \
            --username "$JFROG_USER" \
            --password "$JFROG_PASSWORD" \
            mlplatform/dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: mlplatform/dist/*
