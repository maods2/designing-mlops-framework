workflow_name: example_workflow_sequential
execution_mode: sequential
pipeline_type: training
feature_name: example
config_version: 2
models:
  - model_name: example_model
    compute: s
    training_platform: VertexAI
    module: "example_model.train"
    optional_configs:
      test_size: 0.2
      # Local file fallback (used when bq_params is absent)
      train_data_path: "example_model/data/sample_train.csv"
      hyperparameters:
        max_iter: 1000
      # BigQuery parameters -- injected into sql/load_training_data.sql.
      # Uncomment below to load training data from BigQuery instead of CSV.
      # bq_params:
      #   project: my-gcp-project
      #   dataset: my_dataset
      #   table: training_features
      #   start_date: "2025-01-01"
      #   end_date: "2025-12-31"
      #   sample_fraction: 1.0
      #   target_column: target
