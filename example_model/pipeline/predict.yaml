pipeline_name: example_workflow_prediction
pipeline_type: prediction
feature_name: example


schedule:
  dev: ""
  qa: "0 0 6 ? * MON"
  prod: "0 0 6 ? * MON"

environments:
  dev: true
  qa: true
  prod: false

tasks:
  - task_id: predict
    task_type: prediction
    config:
      - global
      - predict-dev
    model_name: example_model
    compute: s
    platform: Dataproc
    module: "example_model.predict"


