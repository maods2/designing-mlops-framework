# Training pipeline DAG - trend model v2.
workflow_name: trend_workflow_sequential
execution_mode: sequential
pipeline_type: training
feature_name: trend
config_version: 2
log_level: INFO

resources:
  jobs:
    schedule:
      dev: "0 0 6 ? * MON"
      qa: "0 0 6 ? * MON"
      prod: "0 0 6 ? * MON"

    environments:
      dev: true
      qa: true
      prod: false

    tasks:
      - task_key: "train_trend_model"
        config:
          - global
          - dev
        model_name: trend_model_v2
        compute: s
        training_platform: VertexAI
        module: "example_model_v2.train"
