# Prediction pipeline for the examples/ usage demo.
# Used by examples/04_config_from_yaml.py.

workflow_name: churn_prediction_workflow
execution_mode: sequential
pipeline_type: prediction
feature_name: churn
config_version: 2

models:
  - model_name: churn_model_v1
    serving_platform: VertexAI
    module: "churn.predict"
    model_version: "1.0"

    # BigQuery I/O
    prediction_dataset_name: my_project
    prediction_table_name: customers
    prediction_output_dataset_table: my_project.churn_predictions

    unique_identifier_column: customer_id
    predicted_label_column_name: will_churn
    predicted_probability_column_name: churn_probability

    optional_configs:
      prediction_threshold: 0.5
