# Training pipeline for the examples/ usage demo.
# Used by examples/04_config_from_yaml.py.

workflow_name: churn_training_workflow
execution_mode: sequential
pipeline_type: training
feature_name: churn
config_version: 2

models:
  - model_name: churn_model_v1
    compute: s
    training_platform: VertexAI
    module: "churn.train"
    model_version: "1.0"
    optional_configs:
      learning_rate: 0.01
      max_iter: 500
      test_size: 0.2

  - model_name: churn_model_v2_experimental
    compute: m
    training_platform: local
    module: "churn.train_v2"
    model_version: "2.0-exp"
    optional_configs:
      learning_rate: 0.005
      max_iter: 1000
      test_size: 0.2
