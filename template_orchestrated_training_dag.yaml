workflow_name: eds_orchestrated_training
execution_mode: sequential
pipeline_type: training
feature_name: eds
config_version: 2
models:
  - model_name: prepare_features
    module: "example_model.train"
    compute: s
    training_platform: VertexAI
    optional_configs:
      train_data_path: "example_model/data/sample_train.csv"

  - model_name: train_model
    module: "example_model.train"
    depends_on: [prepare_features]
    cloud:
      image: us-docker.pkg.dev/my-project/ml/train:latest
      compute:
        class: m
      scheduling:
        max_retries: 2
    optional_configs:
      train_data_path: "example_model/data/sample_train.csv"
      hyperparameters:
        max_iter: 1000
