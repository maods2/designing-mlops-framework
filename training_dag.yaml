workflow_name: eds_workflow_sequential
execution_mode: sequential  # Options: sequential, parallel
pipeline_type: training
feature_name: eds  # Vehicle feature abbreviated name (e.g., eds, ol, tsl)
config_version: 2
models:
  - model_name: lr_p708  # Unique identifier for this model
    # Compute size: xs (4 cores, 15GB), s (8 cores, 32GB), m (16 cores, 64GB), l (60 cores, 240GB)
    compute: s 
    runner: VertexAI # Options: DataprocSparkRunner, VertexAI
    # Optional: Path to custom training script (relative to source code bucket)
    # Leave empty to use default training pipeline
    python_module: "example_model.train"
    # Optional configurations for training
    optional_configs:
      # Test/train split ratio (between 0 and 1). Default: 0.2
      test_size: 0.2
      # Model hyperparameters (customize based on your model type)
      hyperparameters:
        n_estimators: 100
        max_depth: 10
        min_samples_split: 2
        min_samples_leaf: 1
        min_samples_leaf: 1
      # Optional: Add any additional training configurations here
      # custom_param: value